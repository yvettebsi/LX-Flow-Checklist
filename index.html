*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
.page{max-width:680px;margin:0 auto;padding:1.5rem 1rem 3rem}
.page-title{font-size:20px;font-weight:600;color:#1a1a18;margin-bottom:4px}
.page-sub{font-size:13px;color:#888780;margin-bottom:1rem}

.ref-banner strong{font-weight:600}
.picker{display:flex;gap:10px;margin-bottom:1.25rem}
.phase-card{flex:1;border:0.5px solid #d3d1c7;border-radius:12px;padding:0.875rem 0.75rem;cursor:pointer;background:#fff;text-align:center;transition:background 0.15s,border-color 0.15s}
.phase-card:hover{background:#f1efe8}
.phase-card.active.p0{border:1.5px solid #185FA5;background:#E6F1FB}
.phase-card.active.p1{border:1.5px solid #3B6D11;background:#EAF3DE}
.phase-card.active.p2{border:1.5px solid #854F0B;background:#FAEEDA}
.card-num{font-size:20px;font-weight:600}
.card-label{font-size:11px;margin-top:2px}
.phase-card.active.p0 .card-num,.phase-card.active.p0 .card-label{color:#185FA5}
.phase-card.active.p1 .card-num,.phase-card.active.p1 .card-label{color:#3B6D11}
.phase-card.active.p2 .card-num,.phase-card.active.p2 .card-label{color:#854F0B}
.phase-card:not(.active) .card-num,.phase-card:not(.active) .card-label{color:#888780}
.checklist{border:0.5px solid #d3d1c7;border-radius:12px;overflow:hidden;background:#fff}
.checklist-header{padding:0.875rem 1rem;display:flex;align-items:center;gap:10px}
.checklist-header.p0{background:#E6F1FB}
.checklist-header.p1{background:#EAF3DE}
.checklist-header.p2{background:#FAEEDA}
.header-title{font-size:15px;font-weight:600;flex:1}
.p0 .header-title{color:#0C447C}
.p1 .header-title{color:#27500A}
.p2 .header-title{color:#633806}
.header-pct{font-size:13px;font-weight:500;white-space:nowrap}
.p0 .header-pct{color:#185FA5}
.p1 .header-pct{color:#3B6D11}
.p2 .header-pct{color:#854F0B}
.pbar-wrap{height:3px;background:#f1efe8}
.pbar{height:3px;transition:width 0.3s}
.p0 .pbar{background:#185FA5}
.p1 .pbar{background:#3B6D11}
.p2 .pbar{background:#854F0B}
.section-label{font-size:11px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:0.06em;padding:10px 1rem 4px;background:#f5f4f0}
.info-row{padding:8px 1rem;background:#EEEDFE;border-top:0.5px solid #CECBF6;display:flex;align-items:flex-start;gap:8px}
.info-text{font-size:12px;color:#3C3489;line-height:1.6}
.check-row{display:flex;align-items:flex-start;gap:10px;padding:9px 1rem;border-top:0.5px solid #e8e6e0;background:#fff;cursor:pointer;transition:background 0.1s}
.check-row:hover{background:#f5f4f0}
.check-row.done .check-label{color:#b4b2a9;text-decoration:line-through}
.check-box{width:17px;height:17px;border-radius:3px;border:0.5px solid #b4b2a9;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:background 0.15s}
.p0 .check-box.ticked{background:#E6F1FB;border-color:#185FA5;color:#185FA5}
.p1 .check-box.ticked{background:#EAF3DE;border-color:#3B6D11;color:#3B6D11}
.p2 .check-box.ticked{background:#FAEEDA;border-color:#854F0B;color:#854F0B}
.check-label{font-size:13px;color:#1a1a18;line-height:1.5;flex:1;display:flex;flex-wrap:wrap;align-items:center;gap:4px}
.check-row.done .check-label{color:#b4b2a9}

.pill-link:hover{background:#E6F1FB}
.alert-row{padding:10px 14px;background:#FCEBEB;border-top:0.5px solid #F09595;border-left:3px solid #A32D2D;display:flex;align-items:flex-start;gap:8px}
.alert-text{font-size:12px;color:#791F1F;line-height:1.5;font-weight:600}
.warn-row{padding:10px 1rem;background:#fff8eb;border-top:0.5px solid #FAC775;display:flex;align-items:flex-start;gap:8px}
.warn-text{font-size:12px;color:#633806;line-height:1.5}
.complete-banner{padding:10px 1rem;background:#EAF3DE;border-top:0.5px solid #C0DD97;text-align:center;font-size:13px;color:#27500A;font-weight:600}
.reset-btn{font-size:12px;color:#5F5E5A;border:1.5px solid #b4b2a9;background:#ffffff;border-radius:999px;padding:5px 14px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background 0.15s,border-color 0.15s}
.reset-btn:hover{background:#f1efe8;border-color:#5F5E5A}
.reset-btn:active{background:#e8e6e0;transform:scale(0.97)}
</style>

var state=PHASES.map(function(p){return p.sections.map(function(s){return s.items?s.items.map(function(){return false;}):[];});});
var active=0;

function makePillLinks(item){
  var html='';
  if(item.link){
    html+=' <a href="'+item.link.url+'" target="_blank" onclick="event.stopPropagation()" class="pill-link">'+item.link.text+' &#8599;</a>';
  } else if(item.links){
    for(var i=0;i<item.links.length;i++){
      html+=' <a href="'+item.links[i].url+'" target="_blank" onclick="event.stopPropagation()" class="pill-link">'+item.links[i].text+' &#8599;</a>';
    }
  }
  return html;
}

function renderPicker(){
  var html='';
  for(var i=0;i<PHASES.length;i++){
    var p=PHASES[i];
    var total=0,done=0;
    for(var si=0;si<p.sections.length;si++){if(p.sections[si].items){total+=p.sections[si].items.length;for(var ii=0;ii<p.sections[si].items.length;ii++){if(state[i][si][ii])done++;}}}
    html+='<div class="phase-card p'+i+(active===i?' active':'')+'" onclick="setActive('+i+')"><div class="card-num">'+done+'/'+total+'</div><div class="card-label">'+p.short+'</div></div>';
  }
  document.getElementById('picker').innerHTML=html;
}

function renderChecklist(){
  var pi=active,p=PHASES[pi];
  var total=0,done=0;
  for(var si=0;si<p.sections.length;si++){if(p.sections[si].items){total+=p.sections[si].items.length;for(var ii=0;ii<p.sections[si].items.length;ii++){if(state[pi][si][ii])done++;}}}
  var pct=total?Math.round(done/total*100):0;
  var html='<div class="checklist"><div class="checklist-header p'+pi+'"><span class="header-title">Phase '+(pi+1)+' — '+p.label+'</span><span class="header-pct">'+done+'/'+total+'</span><button class="reset-btn" onclick="resetPhase('+pi+')">Reset</button></div><div class="pbar-wrap p'+pi+'"><div class="pbar" style="width:'+pct+'%"></div></div>';
  for(var si=0;si<p.sections.length;si++){
    var sec=p.sections[si];
    html+='<div class="section-label">'+sec.label+'</div>';
    if(sec.alert){html+='<div class="alert-row"><span class="alert-text">&#9888;&nbsp;'+sec.alert+'</span></div>';}
    if(sec.info){
      var lines=sec.info.split('\n\n');
      html+='<div class="info-row"><span class="info-text">';
      for(var li=0;li<lines.length;li++){html+='<p style="margin-bottom:'+(li<lines.length-1?'6px':'0')+'">'+lines[li]+'</p>';}
      html+='</span></div>';
    }
    if(sec.note){html+='<div class="info-row"><span class="info-text">'+sec.note+'</span></div>';}
    if(sec.items){
      for(var ii=0;ii<sec.items.length;ii++){
        var item=sec.items[ii];
        var d=state[pi][si][ii];
        html+='<div class="check-row'+(d?' done':'')+'" onclick="toggle('+pi+','+si+','+ii+')">';
        html+='<div class="check-box p'+pi+(d?' ticked':'')+'">'+( d?'&#10003;':''  )+'</div>';
        html+='<div class="check-label">'+item.t+makePillLinks(item)+'</div>';
        html+='</div>';
      }
    }
    if(sec.warn){html+='<div class="warn-row"><span class="warn-text">&#9888;&nbsp; Confirm all items above before you mark this card done and hand off to the next phase.</span></div>';}
  }
  html+='<div class="complete-banner" style="'+(done===total?'display:block':'display:none')+'">Phase '+(pi+1)+' complete — ready to hand off &#10003;</div></div>';
  document.getElementById('checklist-view').innerHTML=html;
}

function setActive(i){active=i;renderPicker();renderChecklist();}
function toggle(pi,si,ii){state[pi][si][ii]=!state[pi][si][ii];renderPicker();renderChecklist();}
function resetPhase(pi){state[pi]=PHASES[pi].sections.map(function(s){return s.items?s.items.map(function(){return false;}):[];});renderPicker();renderChecklist();}

renderPicker();
renderChecklist();
</script>
